<svg viewBox="0 0 400 380" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.8"/>
              <stop offset="100%" stop-color="#c9a96e" stop-opacity="0.1"/>
            </linearGradient>
          </defs>
          <!-- Abstract architectural line drawing -->
          <rect x="60" y="60" width="280" height="200" fill="none" stroke="#c9a96e" stroke-width="0.5" opacity="0.3"/>
          <rect x="80" y="80" width="240" height="160" fill="none" stroke="#c9a96e" stroke-width="0.3" opacity="0.2"/>
          <!-- Floor plan lines -->
          <line x1="60" y1="140" x2="340" y2="140" stroke="#c9a96e" stroke-width="0.4" opacity="0.3"/>
          <line x1="200" y1="60" x2="200" y2="260" stroke="#c9a96e" stroke-width="0.4" opacity="0.3"/>
          <!-- Room divisions -->
          <line x1="60" y1="200" x2="200" y2="200" stroke="#c9a96e" stroke-width="0.3" opacity="0.25"/>
          <line x1="130" y1="140" x2="130" y2="260" stroke="#c9a96e" stroke-width="0.3" opacity="0.25"/>
          <!-- Dimension marks -->
          <line x1="60" y1="290" x2="340" y2="290" stroke="#c9a96e" stroke-width="0.4" opacity="0.2"/>
          <line x1="60" y1="284" x2="60" y2="296" stroke="#c9a96e" stroke-width="0.5" opacity="0.3"/>
          <line x1="340" y1="284" x2="340" y2="296" stroke="#c9a96e" stroke-width="0.5" opacity="0.3"/>
          <!-- Elevation marks on side -->
          <line x1="20" y1="60" x2="20" y2="260" stroke="#c9a96e" stroke-width="0.4" opacity="0.2"/>
          <line x1="14" y1="60" x2="26" y2="60" stroke="#c9a96e" stroke-width="0.5" opacity="0.3"/>
          <line x1="14" y1="260" x2="26" y2="260" stroke="#c9a96e" stroke-width="0.5" opacity="0.3"/>
          <!-- Corner accents -->
          <rect x="60" y="60" width="12" height="12" fill="none" stroke="#c9a96e" stroke-width="0.8" opacity="0.5"/>
          <rect x="328" y="60" width="12" height="12" fill="none" stroke="#c9a96e" stroke-width="0.8" opacity="0.5"/>
          <rect x="60" y="248" width="12" height="12" fill="none" stroke="#c9a96e" stroke-width="0.8" opacity="0.5"/>
          <rect x="328" y="248" width="12" height="12" fill="none" stroke="#c9a96e" stroke-width="0.8" opacity="0.5"/>
          <!-- Center mark -->
          <circle cx="200" cy="160" r="4" fill="none" stroke="#c9a96e" stroke-width="0.6" opacity="0.4"/>
          <circle cx="200" cy="160" r="1.5" fill="#c9a96e" opacity="0.3"/>
          <!-- Label areas -->
          <text x="115" y="175" font-family="monospace" font-size="7" fill="rgba(201,169,110,0.25)" text-anchor="middle" letter-spacing="1">LIVING</text>
          <text x="270" y="175" font-family="monospace" font-size="7" fill="rgba(201,169,110,0.25)" text-anchor="middle" letter-spacing="1">KITCHEN</text>
          <text x="115" y="232" font-family="monospace" font-size="7" fill="rgba(201,169,110,0.25)" text-anchor="middle" letter-spacing="1">DINING</text>
          <text x="270" y="232" font-family="monospace" font-size="7" fill="rgba(201,169,110,0.25)" text-anchor="middle" letter-spacing="1">ENTRY</text>
          <!-- Scale bar -->
          <line x1="150" y1="330" x2="250" y2="330" stroke="#c9a96e" stroke-width="0.5" opacity="0.25"/>
          <text x="200" y="345" font-family="monospace" font-size="8" fill="rgba(201,169,110,0.2)" text-anchor="middle" letter-spacing="2">SCALE 1:100</text>
        </svg>